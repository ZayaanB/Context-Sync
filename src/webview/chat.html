<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'nonce-{{NONCE}}'; style-src 'unsafe-inline';">
  <title>ContextSync Chat</title>
  <style>
    :root {
      --bg: var(--vscode-editor-background);
      --fg: var(--vscode-editor-foreground);
      --input-bg: var(--vscode-input-background);
      --input-border: var(--vscode-input-border);
      --button-bg: var(--vscode-button-background);
      --button-fg: var(--vscode-button-foreground);
      --button-secondary-bg: var(--vscode-button-secondaryBackground);
      --button-secondary-fg: var(--vscode-button-secondaryForeground);
      --user-bubble: var(--vscode-editorWidget-background);
      --border: var(--vscode-panel-border);
      --muted: var(--vscode-descriptionForeground);
      --warn: var(--vscode-editorWarning-foreground);
      --error: var(--vscode-editorError-foreground);
      --success: #73c991;
      --font: var(--vscode-font-family);
      --font-size: var(--vscode-font-size);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font);
      font-size: var(--font-size);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* config warning banner */
    #config-warning {
      display: none;
      background: var(--vscode-inputValidation-warningBackground);
      border-bottom: 1px solid var(--vscode-inputValidation-warningBorder);
      padding: 6px 12px;
      font-size: 11px;
      color: var(--warn);
      flex-shrink: 0;
    }
    #config-warning.visible { display: block; }

    /* simple header */
    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 8px;
    }

    #header h1 { font-size: 13px; font-weight: 600; }

    #header-actions { display: flex; gap: 6px; align-items: center; }


/* model selector */
#model-select {
 background: var(--input-bg);
 color: var(--fg);
 border: 1px solid var(--border);
 border-radius: 4px;
 padding: 3px 8px;
 font-size: 11px;
 font-family: var(--font);
 cursor: pointer;
 max-width: 140px;
}
#model-select:focus {
 border-color: var(--vscode-focusBorder);
 outline: none;
}
#model-select option {
 background: var(--input-bg);
 font-size: 11px;
}


    .icon-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 4px;
      padding: 3px 8px;
      font-size: 11px;
      cursor: pointer;
      white-space: nowrap;
    }
    .icon-btn:hover { color: var(--fg); border-color: var(--fg); }

    /* sync status icon */
    #sync-badge {
      font-size: 11px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      position: relative;
    }

    #sync-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }
    #sync-dot.green { background: var(--success); }
    #sync-dot.warn  { background: var(--warn); }

    /* context icon */
    #context-tooltip {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      background: var(--vscode-editorWidget-background);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 8px 10px;
      font-size: 11px;
      white-space: nowrap;
      z-index: 100;
      min-width: 200px;
      max-width: 320px;
    }
    #context-tooltip.visible { display: block; }
    #context-tooltip ul {
      margin-top: 4px;
      padding-left: 14px;
      color: var(--muted);
      max-height: 150px;
      overflow-y: auto;
    }
    #context-tooltip li { margin-bottom: 2px; word-break: break-all; }

    /* messages section */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .message { display: flex; flex-direction: column; gap: 3px; max-width: 90%; }
    .message.user { align-self: flex-end; }
    .message.assistant { align-self: flex-start; }
    .message.system { align-self: center; max-width: 100%; }

    .bubble {
      padding: 8px 12px;
      border-radius: 8px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 13px;
    }

    .message.user .bubble {
      background: var(--button-bg);
      color: var(--button-fg);
      border-bottom-right-radius: 2px;
    }

    .message.assistant .bubble {
      background: var(--user-bubble);
      border-bottom-left-radius: 2px;
    }

    .message.system .bubble {
      background: transparent;
      color: var(--muted);
      font-size: 11px;
      font-style: italic;
      text-align: center;
      padding: 4px 8px;
    }

    .message.warning .bubble {
      background: var(--vscode-inputValidation-warningBackground);
      color: var(--warn);
      font-size: 11px;
    }

    .message-meta { font-size: 10px; color: var(--muted); padding: 0 4px; }

    /* typing indicator (AI) */
    #typing {
      display: none;
      align-self: flex-start;
      padding: 8px 12px;
      background: var(--user-bubble);
      border-radius: 8px;
      font-size: 12px;
      color: var(--muted);
    }
    #typing.visible { display: block; }

    /* input area */
    #input-bar {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 10px 12px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    #input-row { display: flex; gap: 8px; }

    #user-input {
      flex: 1;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      color: var(--fg);
      font-family: var(--font);
      font-size: var(--font-size);
      padding: 6px 10px;
      border-radius: 4px;
      resize: none;
      height: 36px;
      max-height: 120px;
      outline: none;
      overflow: hidden;
    }
    #user-input:focus { border-color: var(--vscode-focusBorder); }

    #send-btn {
      background: var(--button-bg);
      color: var(--button-fg);
      border: none;
      padding: 6px 14px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      flex-shrink: 0;
      align-self: flex-end;
    }
    #send-btn:hover { opacity: 0.9; }
    #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    #action-row {
      display: flex;
      gap: 6px;
      justify-content: flex-end;
    }

    #privacy-btn.active {
      background: var(--vscode-inputValidation-warningBackground);
      color: var(--warn);
      border-color: var(--warn);
    }
  </style>
</head>
<body>

  <div id="config-warning"></div>

  <div id="header">
    <h1>⚡ ContextSync</h1>
    <div id="header-actions">
 <select id="model-select" title="Select Copilot model">
 <option value="">Loading models…</option>
 </select>
      <div id="sync-badge" title="Click to see loaded context files">
        <span id="sync-dot"></span>
        <span id="sync-label">Starting…</span>
        <div id="context-tooltip">
          <strong>Loaded context files</strong>
          <ul id="context-file-list"></ul>
        </div>
      </div>
    </div>
  </div>

  <div id="messages">
    <div class="message assistant">
      <div class="bubble">Hello! I'm ContextSync — your team's shared AI assistant. Ask me anything. Useful conversations will automatically sync to your team's context graph.</div>
    </div>
  </div>

  <div id="typing">AI is thinking…</div>

  <div id="input-bar">
    <div id="input-row">
      <textarea id="user-input" placeholder="Ask something…" rows="1"></textarea>
      <button id="send-btn">Send</button>
    </div>
    <div id="action-row">
      <button class="icon-btn" id="privacy-btn" title="Toggle privacy mode — your messages won't be saved or shared">🔒 Privacy Off</button>
      <button class="icon-btn" id="force-save-btn" title="Force save this conversation, bypassing the quality gate">💾 Force Save</button>
      <button class="icon-btn" id="new-session-btn" title="Start a fresh chat session">＋ New Session</button>
    </div>
  </div>

  <script nonce="{{NONCE}}">    const vscode = acquireVsCodeApi();
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const typingEl = document.getElementById('typing');
    const syncLabel = document.getElementById('sync-label');
    const syncDot = document.getElementById('sync-dot');
    const syncBadge = document.getElementById('sync-badge');
    const tooltip = document.getElementById('context-tooltip');
    const fileList = document.getElementById('context-file-list');
    const configWarning = document.getElementById('config-warning');
    const newSessionBtn = document.getElementById('new-session-btn');
    const forceSaveBtn = document.getElementById('force-save-btn');
    const privacyBtn = document.getElementById('privacy-btn');
    const modelSelect = document.getElementById('model-select');
    let privacyEnabled = false;
    let availableModels = [];

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    modelSelect.addEventListener('change', () => {
      const modelId = modelSelect.value;
      vscode.postMessage({ type: 'setModel', modelId });
    });

    function renderModelOptions(models) {
      availableModels = Array.isArray(models) ? models : [];

      if (!availableModels.length) {
        modelSelect.innerHTML = '<option value="">No models found</option>';
        modelSelect.disabled = true;
        return;
      }

      modelSelect.innerHTML = availableModels.map((m, i) => {
        const safeName = escapeHtml(m.name);
        const safeId = escapeHtml(m.id);
        return `<option value="${safeId}" ${i === 0 ? 'selected' : ''}>${safeName}</option>`;
      }).join('');

      modelSelect.disabled = false;

      // sync model change to extension
      vscode.postMessage({ type: 'setModel', modelId: modelSelect.value });
    }

    // tooltip
    syncBadge.addEventListener('click', () => {
      tooltip.classList.toggle('visible');
    });
    document.addEventListener('click', (e) => {
      if (!syncBadge.contains(e.target)) tooltip.classList.remove('visible');
    });

    // privacy, new session, and force save actions
    privacyBtn.addEventListener('click', () => {
      privacyEnabled = !privacyEnabled;
      privacyBtn.textContent = privacyEnabled ? '🔓 Privacy On' : '🔒 Privacy Off';
      privacyBtn.classList.toggle('active', privacyEnabled);
      vscode.postMessage({ type: 'setPrivacy', enabled: privacyEnabled });
      appendSystemMessage(privacyEnabled
        ? '🔓 Privacy mode on — your messages will not be saved or shared.'
        : '🔒 Privacy mode off — conversations will sync normally.'
      );
    });

    newSessionBtn.addEventListener('click', () => {
      vscode.postMessage({ type: 'newSession' });
    });

    forceSaveBtn.addEventListener('click', () => {
      vscode.postMessage({ type: 'forceSave' });
    });

    // send message
    function sendMessage() {
      const content = inputEl.value.trim();
      if (!content) return;
      inputEl.value = '';
      inputEl.style.height = '36px';
      vscode.postMessage({ type: 'sendMessage', content });
    }

    sendBtn.addEventListener('click', sendMessage);
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
    inputEl.addEventListener('input', () => {
      inputEl.style.height = '36px';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
    });

    // receive messages
    window.addEventListener('message', (event) => {
      const msg = event.data;

      if (msg.type === 'addMessage') {
        appendMessage(msg.message);
      }

      if (msg.type === 'setLoading') {
        typingEl.classList.toggle('visible', msg.loading);
        sendBtn.disabled = msg.loading;
        inputEl.disabled = msg.loading;
      }

      if (msg.type === 'modelList') {
        renderModelOptions(msg.models);
      }

      if (msg.type === 'syncStatus') {
        syncLabel.textContent = `${msg.status} · ${msg.fileCount} context file${msg.fileCount !== 1 ? 's' : ''}`;
        syncDot.className = msg.fileCount > 0 ? 'green' : '';
        
        // Update tooltip file list
        fileList.innerHTML = msg.fileNames.length
          ? msg.fileNames.map(f => `<li>${escapeHtml(f)}</li>`).join('')
          : '<li style="font-style:italic">No files loaded yet</li>';
      }

      if (msg.type === 'qualityGateRejected') {
        appendSystemMessage('💬 Chat not saved — not technically useful enough yet. Keep discussing or use Force Save.');
      }

      if (msg.type === 'sessionReset') {
        appendSystemMessage('─── New session started ───');
      }

      if (msg.type === 'inactivityReset') {
        appendSystemMessage('⏱ ' + msg.message);
      }

      if (msg.type === 'configWarning') {
        configWarning.textContent = '⚠ ' + msg.warnings.join('  |  ') + '  — Open Settings (Ctrl+,) and search "ContextSync".';
        configWarning.classList.add('visible');
      }

      if (msg.type === 'error') {
        appendWarningMessage('⚠ ' + msg.message);
      }
    });

    // helpers (AI)
    function appendMessage(msg) {
      const wrapper = document.createElement('div');
      wrapper.className = `message ${msg.role}`;
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = msg.content;
      const meta = document.createElement('div');
      meta.className = 'message-meta';
      const time = new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      meta.textContent = msg.role === 'user' ? `You · ${time}` : `AI · ${time}`;
      wrapper.appendChild(bubble);
      wrapper.appendChild(meta);
      messagesEl.appendChild(wrapper);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function appendSystemMessage(text) {
      const wrapper = document.createElement('div');
      wrapper.className = 'message system';
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;
      wrapper.appendChild(bubble);
      messagesEl.appendChild(wrapper);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function appendWarningMessage(text) {
      const wrapper = document.createElement('div');
      wrapper.className = 'message warning';
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;
      wrapper.appendChild(bubble);
      messagesEl.appendChild(wrapper);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    vscode.postMessage({ type: 'ready' });
    vscode.postMessage({ type: 'requestModels' });
  </script>
</body>
</html>
